<div class="container mt-5">


<h1>
Cadastro de Veículo
</h1>



<form id="formVeiculo">



<div class="mb-3">

<label>
Marca
</label>

<input 
class="form-control"
id="marca"
required>

</div>





<div class="mb-3">

<label>
Modelo
</label>

<input 
class="form-control"
id="modelo"
required>

</div>






<div class="mb-3">

<label>
Ano
</label>

<input 
type="number"
class="form-control"
id="ano"
required>

</div>






<div class="mb-3">

<label>
Placa
</label>

<input 
class="form-control"
id="placa"
required>

</div>






<div class="mb-3">

<label>
Preço
</label>

<input 
type="number"
class="form-control"
id="preco"
required>

</div>






<button class="btn btn-primary">

Cadastrar veículo

</button>




</form>


</div>





<script>


document
.getElementById("formVeiculo")
.addEventListener("submit",function(e){


e.preventDefault();



let veiculos =
JSON.parse(localStorage.getItem("veiculos")) || [];



let veiculo = {


marca:
document.getElementById("marca").value,


modelo:
document.getElementById("modelo").value,


ano:
document.getElementById("ano").value,


placa:
document.getElementById("placa").value,


preco:
document.getElementById("preco").value



};




veiculos.push(veiculo);



localStorage.setItem(
"veiculos",
JSON.stringify(veiculos)
);



alert("Veículo cadastrado!");



this.reset();



window.location.href="lista-veiculos.html";



});


</script>




</body>
