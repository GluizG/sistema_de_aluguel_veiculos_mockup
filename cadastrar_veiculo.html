<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadastrar Veículo</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body>


<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="index.html">
🚗 Luiz Carros
</a>


<a href="lista_veiculos.html" class="btn btn-outline-light">
Lista Veículos
</a>


</div>

</nav>



<div class="container mt-5">


<h1>Cadastro de Veículo</h1>


<form id="formVeiculo">


<label>Marca</label>
<input id="marca" class="form-control" required>


<label class="mt-3">Modelo</label>
<input id="modelo" class="form-control" required>


<label class="mt-3">Ano</label>
<input id="ano" type="number" class="form-control" required>


<label class="mt-3">Placa</label>
<input id="placa" class="form-control" required>


<label class="mt-3">Preço</label>
<input id="preco" type="number" class="form-control" required>


<br>


<button class="btn btn-primary">
Cadastrar veículo
</button>


</form>


</div>




<script>


document
.getElementById("formVeiculo")
.addEventListener("submit", function(e){


e.preventDefault();



let lista =
JSON.parse(localStorage.getItem("veiculos")) || [];



let carro = {

marca: document.getElementById("marca").value,

modelo: document.getElementById("modelo").value,

ano: document.getElementById("ano").value,

placa: document.getElementById("placa").value,

preco: document.getElementById("preco").value

};



lista.push(carro);



localStorage.setItem(
"veiculos",
JSON.stringify(lista)
);



alert("Veículo cadastrado!");



window.location.href="lista_veiculos.html";



});


</script>


</body>

</html>
